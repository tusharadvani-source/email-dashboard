<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #23273a;
      --border: #2e3248;
      --accent: #6c63ff;
      --accent2: #00d2ff;
      --text: #e8eaf6;
      --muted: #7b80a0;
      --green: #4caf82;
      --orange: #f5a623;
      --red: #e05c5c;
      --purple: #b57bee;
      --blue: #5ba4f5;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* Header */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type="date"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
    }

    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover { background: var(--border); }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 14px;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.25s;
      z-index: 999;
      max-width: 320px;
    }

    #toast.show { opacity: 1; transform: translateY(0); }

    /* Main */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px;
    }

    .page-title {
      margin-bottom: 6px;
      font-size: 22px;
      font-weight: 700;
    }

    .page-subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 28px;
    }

    /* Summary row */
    .summary-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }

    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .summary-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .summary-card.active { border-color: var(--accent); background: var(--surface2); }

    .summary-count {
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 4px;
    }

    .summary-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Category sections */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    .section-header:hover { background: var(--surface2); }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 15px;
    }

    .badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .chevron {
      color: var(--muted);
      transition: transform 0.2s;
      font-size: 18px;
    }

    .section.open .chevron { transform: rotate(180deg); }

    .section-body { display: none; border-top: 1px solid var(--border); }
    .section.open .section-body { display: block; }

    /* Sub-group label */
    .sub-group {
      padding: 10px 20px 4px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
    }

    /* Email row */
    .email-row {
      display: grid;
      grid-template-columns: 180px 1fr 80px;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      font-size: 14px;
      transition: background 0.1s;
    }

    .email-row:first-of-type { border-top: none; }
    .email-row:hover { background: var(--surface2); }

    .email-from {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .email-subject {
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .email-time {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    /* Action badge for needs_action */
    .action-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(240, 82, 82, 0.15);
      color: var(--red);
      margin-left: 6px;
      vertical-align: middle;
    }

    /* Empty / loading states */
    .state-box {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .state-box .icon { font-size: 40px; margin-bottom: 12px; }
    .state-box p { font-size: 15px; }
    .state-box small { font-size: 13px; margin-top: 6px; display: block; }

    /* Color accents per category */
    .color-promo   { color: #f5a623; }
    .color-imp     { color: #5ba4f5; }
    .color-bills   { color: #e05c5c; }
    .color-matri   { color: #b57bee; }
    .color-others  { color: #7b80a0; }

    .badge-promo   { background: rgba(245,166,35,0.15);  color: #f5a623; }
    .badge-imp     { background: rgba(91,164,245,0.15);  color: #5ba4f5; }
    .badge-bills   { background: rgba(224,92,92,0.15);   color: #e05c5c; }
    .badge-matri   { background: rgba(181,123,238,0.15); color: #b57bee; }
    .badge-others  { background: rgba(123,128,160,0.15); color: #7b80a0; }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 32px 20px;
    }

    @media (max-width: 600px) {
      .email-row { grid-template-columns: 1fr; gap: 2px; }
      .email-time { text-align: left; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">✉</div>
    Email Dashboard
  </div>
  <div class="header-controls">
    <input type="date" id="datePicker" />
    <button class="btn btn-ghost" onclick="loadDate(document.getElementById('datePicker').value)">Load</button>
    <button class="btn btn-primary" onclick="runNow()">⚡ Run Now</button>
  </div>
</header>

<main>
  <div class="page-title" id="pageTitle">Daily Email Summary</div>
  <div class="page-subtitle" id="pageSubtitle">Loading…</div>
  <div class="summary-row" id="summaryRow"></div>
  <div id="categories"></div>
</main>

<footer>Email Dashboard · Powered by Claude · <a href="https://claude.ai/code/routines" target="_blank" style="color:inherit">Manage routines</a></footer>

<div id="toast"></div>

<script>
  const REPO = 'tusharadvani-source/email-dashboard';
  const ROUTINE_ID = 'trig_01E7LSQNwPMRFTBZyETavG8J';

  function fmt(dateStr) {
    const d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString('en-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  }

  function todayStr() {
    return new Date().toISOString().slice(0, 10);
  }

  async function fetchData(date) {
    const urls = [
      `data/${date}.json`,
      `https://raw.githubusercontent.com/${REPO}/main/data/${date}.json`
    ];
    for (const url of urls) {
      try {
        const r = await fetch(url + '?_=' + Date.now());
        if (r.ok) return await r.json();
      } catch (_) {}
    }
    return null;
  }

  function showToast(msg, duration = 3500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }

  async function runNow() {
    showToast('Opening routine page to trigger agent on demand…');
    setTimeout(() => {
      window.open('https://claude.ai/code/routines/' + ROUTINE_ID, '_blank');
    }, 600);
  }

  function renderSection({ id, icon, label, colorClass, badgeClass, count, bodyFn }) {
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.id = 'sec-' + id;
    sec.innerHTML = `
      <div class="section-header" onclick="toggleSection('${id}')">
        <div class="section-title">
          <span class="${colorClass}">${icon}</span>
          ${label}
          <span class="badge ${badgeClass}">${count}</span>
        </div>
        <span class="chevron">›</span>
      </div>
      <div class="section-body">${bodyFn()}</div>
    `;
    return sec;
  }

  function emailRow(e, tag) {
    return `<div class="email-row">
      <div class="email-from">${e.from}</div>
      <div class="email-subject">${e.subject}${tag ? `<span class="action-tag">${tag}</span>` : ''}</div>
      <div class="email-time">${e.time || ''}</div>
    </div>`;
  }

  function renderPromo(groups) {
    let html = '';
    for (const [group, emails] of Object.entries(groups)) {
      html += `<div class="sub-group">${group}</div>`;
      html += emails.map(e => emailRow(e)).join('');
    }
    return html;
  }

  function renderImportant(cat) {
    let html = '';
    if (cat.needs_action?.length) {
      html += `<div class="sub-group">Needs Action</div>`;
      html += cat.needs_action.map(e => emailRow(e, 'ACTION')).join('');
    }
    if (cat.informational?.length) {
      html += `<div class="sub-group">Informational</div>`;
      html += cat.informational.map(e => emailRow(e)).join('');
    }
    return html;
  }

  function renderList(items) {
    return items.map(e => emailRow(e)).join('');
  }

  async function loadDate(date) {
    if (!date) date = todayStr();
    document.getElementById('datePicker').value = date;
    document.getElementById('pageTitle').textContent = 'Daily Email Summary';
    document.getElementById('pageSubtitle').textContent = 'Loading…';
    document.getElementById('summaryRow').innerHTML = '';
    document.getElementById('categories').innerHTML = '';

    const data = await fetchData(date);

    if (!data) {
      document.getElementById('pageSubtitle').textContent = fmt(date);
      document.getElementById('categories').innerHTML = `
        <div class="state-box">
          <div class="icon">📭</div>
          <p>No categorization found for this date.</p>
          <small>Hit <strong>Run Now</strong> to generate today's summary, or pick a different date.</small>
        </div>`;
      return;
    }

    document.getElementById('pageSubtitle').textContent =
      `${fmt(date)} · Generated ${new Date(data.generated_at).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })}`;

    const c = data.categories;
    const total = (c.promotional?.total || 0) + (c.important?.total || 0) +
                  (c.pending_bills?.total || 0) + (c.matrimonial?.total || 0) + (c.others?.total || 0);

    const summaries = [
      { label: 'Total', count: total, color: '#e8eaf6', id: null },
      { label: 'Promotional', count: c.promotional?.total || 0, color: '#f5a623', id: 'promo' },
      { label: 'Important', count: c.important?.total || 0, color: '#5ba4f5', id: 'imp' },
      { label: 'Pending Bills', count: c.pending_bills?.total || 0, color: '#e05c5c', id: 'bills' },
      { label: 'Matrimonial', count: c.matrimonial?.total || 0, color: '#b57bee', id: 'matri' },
      { label: 'Others', count: c.others?.total || 0, color: '#7b80a0', id: 'others' },
    ];

    const row = document.getElementById('summaryRow');
    summaries.forEach(s => {
      const card = document.createElement('div');
      card.className = 'summary-card';
      card.innerHTML = `<div class="summary-count" style="color:${s.color}">${s.count}</div><div class="summary-label">${s.label}</div>`;
      if (s.id) card.onclick = () => scrollTo(s.id);
      row.appendChild(card);
    });

    const container = document.getElementById('categories');

    if (c.promotional?.total) {
      container.appendChild(renderSection({
        id: 'promo', icon: '🏷', label: 'Promotional', colorClass: 'color-promo', badgeClass: 'badge-promo',
        count: c.promotional.total, bodyFn: () => renderPromo(c.promotional.groups || {})
      }));
    }

    if (c.important?.total) {
      container.appendChild(renderSection({
        id: 'imp', icon: '⭐', label: 'Important', colorClass: 'color-imp', badgeClass: 'badge-imp',
        count: c.important.total, bodyFn: () => renderImportant(c.important)
      }));
    }

    if (c.pending_bills?.total) {
      container.appendChild(renderSection({
        id: 'bills', icon: '💳', label: 'Pending Bills', colorClass: 'color-bills', badgeClass: 'badge-bills',
        count: c.pending_bills.total, bodyFn: () => renderList(c.pending_bills.items || [])
      }));
    }

    if (c.matrimonial?.total) {
      container.appendChild(renderSection({
        id: 'matri', icon: '💍', label: 'Matrimonial', colorClass: 'color-matri', badgeClass: 'badge-matri',
        count: c.matrimonial.total, bodyFn: () => renderList(c.matrimonial.items || [])
      }));
    }

    if (c.others?.total) {
      container.appendChild(renderSection({
        id: 'others', icon: '📂', label: 'Others', colorClass: 'color-others', badgeClass: 'badge-others',
        count: c.others.total, bodyFn: () => renderList(c.others.items || [])
      }));
    }

    // auto-open first section
    const first = container.querySelector('.section');
    if (first) first.classList.add('open');
  }

  function toggleSection(id) {
    document.getElementById('sec-' + id)?.classList.toggle('open');
  }

  function scrollTo(id) {
    const el = document.getElementById('sec-' + id);
    if (!el) return;
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    el.classList.add('open');
  }

  // Init
  const today = todayStr();
  document.getElementById('datePicker').value = today;
  loadDate(today);
</script>
</body>
</html>
